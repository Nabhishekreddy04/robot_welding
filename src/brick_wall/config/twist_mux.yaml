twist_mux:
  ros__parameters:
    use_sim_time: true
    output_topic: /cmd_vel
    topics:
      navigation:
        topic: /cmd_vel_nav
        timeout: 0.35
        priority: 50
      teleop:
        topic: /cmd_vel_teleop
        timeout: 0.35
        priority: 100
      safety:
        topic: /cmd_vel_safety
        timeout: 0.35
        priority: 255
